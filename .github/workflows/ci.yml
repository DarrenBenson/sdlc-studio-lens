name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Least-privilege by default; each job requests only what it needs.
permissions:
  contents: read

# A newer push to the same branch supersedes an in-flight run - but NOT on main.
# A cancelled run is neither success nor failure, so cancelling on main would let two
# quick pushes leave the intermediate commit silently unverified, which is the exact
# hole this workflow exists to close.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: ruff check src/ tests/

      - name: Check formatting
        working-directory: backend
        run: ruff format --check src/ tests/

      - name: Run backend tests
        working-directory: backend
        run: PYTHONPATH=src python -m pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

  e2e:
    # Playwright cannot run on the dev box (unsupported on Ubuntu 26.04), so CI is
    # the ONLY place this suite executes. Before this job existed it executed
    # nowhere at all, and a UI rewrite silently invalidated settings.spec.ts while
    # 976 unit tests stayed green (RETRO-0006). Do not let this job rot back into
    # being skipped: if it is red, fix it or delete the suite - never ignore it.
    runs-on: ubuntu-latest
    # The Playwright webServer block boots two servers; if either hangs, fail in 20
    # minutes rather than sitting on the 6-hour default.
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      # playwright.config.ts starts the backend and the frontend itself via its
      # webServer block, and global-setup.ts runs Alembic against a scratch DB,
      # so both stacks must be installed here even though this job runs no unit tests.
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
